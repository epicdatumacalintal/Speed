<!DOCTYPE html>
<html lang="en">
<head>
    <!-- favicon 
    <link rel="icon" href="https://raw.githubusercontent.com/tomasdmacalintal/CS3_2ndQtrPortfolio/main/assets/images/cspairproj_favicon2.png" sizes="any">
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/tomasdmacalintal/CS3_2ndQtrPortfolio/main/assets/images/cspairproj_favicon2.png"> -->

    <!-- Encoding + mobile responsiveness -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Page info -->
    <title>Speed</title>
    <meta name="description" content="A game of speed.">
    <meta name="author" content="Datu Macalintal">

    <!-- Link Stylesheet -->


    <style>
        body{
            background-color: rgb(150, 221, 221);
            overflow: hidden;
        }
        .card{
            background: url('./assets/spritesheets/cards.png') no-repeat;
            width: calc(25vmin / 2.5);
            height: calc(35vmin / 2.5);
            background-size: auto 100%;
            animation: draw 0.5s;
            transition: transform 0.3s, left 0.3s, top 0.3s;
            user-select: none;
            position: absolute;
        }
        .hovered{
            transform: scale(1.4);
            z-index: 1;
            cursor: grab;
        }
        .grabbed{
            cursor: grabbing;
            z-index: 999;
            transition: transform 0.3s, left 0s, top 0s;
        }

        @keyframes draw {
            0% {rotate: -30deg; transform: translateY(calc(35vmin / 2.5 * 2));}
            100% {rotate: 0; transform: translateY(0);}
        }
    </style>
</head>
<body>


    <script>
        cards = document.getElementsByClassName('card');
        selectedCard = null;

        originalLeft = [];
        originalTop = 'calc(100% - (35vmin / 2.5) - 5vmin)';

        const CARDNAMES = ["1d","2d","3d","4d","5d","6d","7d","8d","9d","10d","11d","12d","13d",
                        "1h","2h","3h","4h","5h","6h","7h","8h","9h","10h","11h","12h","13h",
                        "1c","2c","3c","4c","5c","6c","7c","8c","9c","10c","11c","12c","13c",
                        "1s","2s","3s","4s","5s","6s","7s","8s","9s","10s","11s","12s","13s"];
        drawnCards = [];
        cardOrder = [];

        gap = 5 * Math.min(window.innerWidth, window.innerHeight) / 100;

        document.addEventListener('mousemove', move);
        document.addEventListener('mouseup', drop);
        window.addEventListener('resize', resize);

        document.addEventListener('keydown', keyPress);
        function keyPress(event){
            if (event.repeat){
                return;
            }
            if (event.key == ' ' && cards.length < 5){
                for (let i = 0; i < cards.length; i++){
                    if (cards[i].classList.contains('grabbed')){
                        return;
                    }
                }

                const card = document.createElement('div');
                card.className = "card";
                for (let i = 0; i < cards.length; i++){
                    originalLeft[i] = 0.5*window.innerWidth - ((25 * Math.min(window.innerWidth, window.innerHeight) / 100 / 2.5) / 2) + (i - (cards.length+1 - 1) / 2) * ((25 * Math.min(window.innerWidth, window.innerHeight) / 100 / 2.5 + gap));
                    cards[i].style.left = `${originalLeft[i]}px`;
                }
                originalLeft.push(0.5*window.innerWidth - ((25 * Math.min(window.innerWidth, window.innerHeight) / 100 / 2.5) / 2) + (cards.length - (cards.length+1 - 1) / 2) * ((25 * Math.min(window.innerWidth, window.innerHeight) / 100 / 2.5 + gap)));
                card.style.left = `${originalLeft[originalLeft.length - 1]}px`;
                card.style.top = originalTop;

                do{
                    random = Math.floor(Math.random() * 52);
                } while (drawnCards.includes(CARDNAMES[random]));
                drawnCards.push(CARDNAMES[random]);
                console.log(drawnCards);

                card.value = CARDNAMES[random].slice(0, -1);
                card.style.backgroundPosition = `calc((-25vmin / 2.5) * ${random}) 0`;
                card.addEventListener('mousemove', hover);
                card.addEventListener('mouseleave', unhover);
                card.addEventListener('mousedown', grab);
                document.body.appendChild(card);
                cardOrder.push(card);
            }
            if (parseInt(event.key) >= 1 && parseInt(event.key) <= cards.length && cards.length >= 1){
                if (!cards[parseInt(event.key)-1].classList.contains('hovered')){
                    for (let i = 0; i < cards.length; i++){
                        cards[i].classList.remove ('hovered'); 
                    }
                    cards[parseInt(event.key)-1].classList.add('hovered');
                }
                else{
                    cards[parseInt(event.key)-1].classList.remove('hovered');
                }
            }
        }

        function hover(event){
            if (!event.target.classList.contains('grabbed')){
                for (let i = 0; i < cards.length; i++){
                    cards[i].classList.remove ('hovered'); 
                }
                event.target.classList.add('hovered');
            }
        }
        function unhover(event){
            event.target.classList.remove('hovered');
        }
        function grab(event){
            event.target.classList.add('grabbed');
            for (let i = 0; i < cards.length; i++){
                if (cards[i] == event.target){
                    selectedCard = i;
                }
                cards[i].classList.remove('hovered'); 
            }
            console.log(selectedCard);
            cards[selectedCard].style.left = event.clientX - cards[selectedCard].offsetWidth/2 + 'px';
            cards[selectedCard].style.top = event.clientY - cards[selectedCard].offsetHeight/2 + 'px';

            
        }
        function move(event){
            if (selectedCard != null){
                cards[selectedCard].style.left = event.clientX - cards[selectedCard].offsetWidth/2 + 'px';
                cards[selectedCard].style.top = event.clientY - cards[selectedCard].offsetHeight/2 + 'px';

                if (cards.length > 1){
                    for (let i = 0; i < cards.length; i++){
                        if (i != selectedCard){
                            topLimit = getComputedStyle(cards[i]).top;
                        }
                    }

                    if (event.clientY < parseInt(topLimit)){
                        for (let i = 0; i < cards.length; i++){
                            if (i < selectedCard){
                                cards[i].style.left = `calc(${originalLeft[i]}px + (25vmin / 2.5) / 2 + ${gap/2}px)`;
                            }
                            if (i > selectedCard){
                                cards[i].style.left = `calc(${originalLeft[i]}px - (25vmin / 2.5) / 2 - ${gap/2}px)`;
                            }
                        }
                    }
                    else{
                        for (let i = 0; i < cards.length; i++){
                            if (i != selectedCard && event.clientX > originalLeft[i] + cards[i].offsetWidth / 2 && cardOrder.indexOf(cards[i]) > cardOrder.indexOf(cards[selectedCard])){
                                cards[cardOrder.indexOf(cards[i])].style.left = `${originalLeft[cardOrder.indexOf(cards[selectedCard])]}px`;
                                [originalLeft[i], originalLeft[selectedCard]] = [originalLeft[selectedCard], originalLeft[i]];
                                [cardOrder[i], cardOrder[selectedCard]] = [cardOrder[selectedCard], cardOrder[i]];
                                break;
                            }
                            if (i != selectedCard && event.clientX < originalLeft[i] + cards[i].offsetWidth / 2 && cardOrder.indexOf(cards[i]) < cardOrder.indexOf(cards[selectedCard])){
                                cards[cardOrder.indexOf(cards[i])].style.left = `${originalLeft[cardOrder.indexOf(cards[selectedCard])]}px`;
                                [originalLeft[i], originalLeft[selectedCard]] = [originalLeft[selectedCard], originalLeft[i]];
                                [cardOrder[i], cardOrder[selectedCard]] = [cardOrder[selectedCard], cardOrder[i]];
                                break;
                            }
                        }
                    }
                }

                
            }
        }
        function drop(event){
            if (selectedCard != null){
                cards[selectedCard].classList.remove('grabbed');
                cards[selectedCard].style.zIndex = 999;
                cards[selectedCard].addEventListener('transitionend', function(){
                    event.target.style.zIndex = '';
                }, {once: true});

                for (let i = 0; i < cards.length; i++){
                    cards[i].style.left = `${originalLeft[i]}px`;
                    cards[i].style.top = originalTop;

                }
                selectedCard = null;
            }
        }
        function resize(){
            for (let i = 0; i < cards.length; i++){
                cards[i].style.transition = 'none';
                originalLeft[i] = 0.5*window.innerWidth - ((25 * Math.min(window.innerWidth, window.innerHeight) / 100 / 2.5) / 2) + (i - (cards.length - 1) / 2) * ((25 * Math.min(window.innerWidth, window.innerHeight) / 100 / 2.5 + gap));
                cards[i].style.left = `${originalLeft[i]}px`;
            }

            document.body.offsetHeight; // Trigger reflow to apply the new positions immediately

            for (let i = 0; i < cards.length; i++){
                cards[i].style.transition = "";
            }
        }
    </script>
</body>
