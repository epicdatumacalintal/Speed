<!DOCTYPE html>
<html lang="en">
<head>
    <!-- favicon 
    <link rel="icon" href="https://raw.githubusercontent.com/tomasdmacalintal/CS3_2ndQtrPortfolio/main/assets/images/cspairproj_favicon2.png" sizes="any">
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/tomasdmacalintal/CS3_2ndQtrPortfolio/main/assets/images/cspairproj_favicon2.png"> -->

    <!-- Encoding + mobile responsiveness -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Page info -->
    <title>Speed</title>
    <meta name="description" content="A game of speed.">
    <meta name="author" content="Datu Macalintal">

    <!-- Link Stylesheet -->


    <style>
        body{
            background-color: rgb(150, 221, 221);
            overflow: hidden;
        }
        .card, .play, .retryCard{
            background: url('./assets/spritesheets/cards.png') no-repeat;
            width: calc(25vmin / 2.5);
            height: calc(35vmin / 2.5);
            background-size: auto 100%;
            transition: transform 0.3s, left 0.3s, top 0.3s;
            user-select: none;
            position: absolute;
        }
        .hovered{
            transform: scale(1.4);
            z-index: 1;
            cursor: grab;
        }
        .grabbed{
            cursor: grabbing;
            z-index: 999;
            transition: transform 0.3s, left 0s, top 0s;
        }

        @keyframes draw {
            0% {rotate: -30deg; transform: translateY(calc(35vmin / 2.5 * 2));}
            100% {rotate: 0; transform: translateY(0);}
        }
    </style>
</head>
<body>


    <script>
        cards = document.getElementsByClassName('card');
        plays = document.getElementsByClassName('play');
        retryCards = document.getElementsByClassName('retryCard');
        selectedCard = null;
        selectIndex = 0;

        originalLeft = [];
        originalTop = 'calc(100% - (35vmin / 2.5) - 5vmin)';

        const CARDNAMES = ["1d","2d","3d","4d","5d","6d","7d","8d","9d","10d","11d","12d","13d",
                        "1h","2h","3h","4h","5h","6h","7h","8h","9h","10h","11h","12h","13h",
                        "1c","2c","3c","4c","5c","6c","7c","8c","9c","10c","11c","12c","13c",
                        "1s","2s","3s","4s","5s","6s","7s","8s","9s","10s","11s","12s","13s"];
        drawnCards = [];
        userDeck = [];
        opponentDeck = [];
        userRetryDeck = [];
        opponentRetryDeck = [];
        userPlayed = [];
        opponentPlayed = [];
        cardOrder = [];

        const MAXCARDS = 5;

        gap = 5 * Math.min(window.innerWidth, window.innerHeight) / 100;

        hoveringPlay = false;

        document.addEventListener('mousemove', move);
        document.addEventListener('mouseup', drop);
        window.addEventListener('resize', resize);
        
        for (let i = 0; i < 20; i++){
            do{
                random = Math.floor(Math.random() * 52);
            } while (drawnCards.includes(CARDNAMES[random]));
            userDeck.push(CARDNAMES[random]);
            drawnCards.push(CARDNAMES[random]);
        }

        for (let i = 0; i < 20; i++){
            do{
                random = Math.floor(Math.random() * 52);
            } while (drawnCards.includes(CARDNAMES[random]));
            opponentDeck.push(CARDNAMES[random]);
            drawnCards.push(CARDNAMES[random]);
        }

        for (let i = 0; i < 5; i++){
            do{
                random = Math.floor(Math.random() * 52);
            } while (drawnCards.includes(CARDNAMES[random]));
            userRetryDeck.push(CARDNAMES[random]);
            drawnCards.push(CARDNAMES[random]);
        }

        for (let i = 0; i < 5; i++){
            do{
                random = Math.floor(Math.random() * 52);
            } while (drawnCards.includes(CARDNAMES[random]));
            opponentRetryDeck.push(CARDNAMES[random]);
            drawnCards.push(CARDNAMES[random]);
        }

        do{
            random = Math.floor(Math.random() * 52);
        } while (drawnCards.includes(CARDNAMES[random]));
        userPlayed.push(CARDNAMES[random]);
        drawnCards.push(CARDNAMES[random]);

        do{
            random = Math.floor(Math.random() * 52);
        } while (drawnCards.includes(CARDNAMES[random]));
        opponentPlayed.push(CARDNAMES[random]);
        drawnCards.push(CARDNAMES[random]);

        for (let i = 0; i < 2; i++){
            const retryCard = document.createElement('div');
            retryCard.className = "retryCard";
            retryCard.style.left = `calc(50% - ((25vmin / 2.5) * 2 + (5vmin / 2) * 3) + ((25vmin / 2.5) * 3 + 5vmin * 3) * ${i})`;
            retryCard.style.top = `calc(50% - (35vmin / 2.5) / 2)`;
            retryCard.style.transition = 'none';
            retryCard.style.backgroundPosition = `calc((-25vmin / 2.5) * 52) 0`;
            document.body.appendChild(retryCard);
        } 

        for (let i = 0; i < 2; i++){
            const play = document.createElement('div');
            play.className = "play";
            play.style.left = `calc(50% - (25vmin / 2.5) - 5vmin / 2 + ((25vmin / 2.5) + 5vmin) * ${i})`;
            play.style.top = `calc(50% - (35vmin / 2.5) / 2)`;
            play.style.transition = 'none';

            if (i == 0){
                play.style.backgroundPosition = `calc((-25vmin / 2.5) * ${CARDNAMES.indexOf(opponentPlayed[0])}) 0`;
                play.value = opponentPlayed[0];
            }
            else{
                play.style.backgroundPosition = `calc((-25vmin / 2.5) * ${CARDNAMES.indexOf(userPlayed[0])}) 0`;
                play.value = userPlayed[0];
            }

            document.body.appendChild(play);
        }

        for (let i = 0; i < 5; i++){
            setTimeout(() => {
                draw();
            }, 500*i);
        }

        document.addEventListener('keydown', keyPress);
        function keyPress(event){
            if (event.repeat){
                return;
            }
            for (let i = 0; i < cards.length; i++){
                if (cards[i].classList.contains('grabbed')){
                    return;
                }
            }
            if (event.key == ' '){
                draw();
            }
            if (parseInt(event.key) >= 1 && parseInt(event.key) <= cards.length && cards.length >= 1){
                selectIndex = parseInt(event.key)-1;
                if (!cards[cardOrder[parseInt(event.key)-1]].classList.contains('hovered')){
                    for (let i = 0; i < cards.length; i++){
                        cards[i].classList.remove ('hovered'); 
                    }
                    cards[cardOrder[parseInt(event.key)-1]].classList.add('hovered');
                }
                else{
                    cards[cardOrder[parseInt(event.key)-1]].classList.remove('hovered');
                }
            }
            if (event.key == 'a'){
                if (cards.length >= 1){
                    alreadyHovered = false;

                    for (let i = 0; i < cards.length; i++){
                        if (cards[i].classList.contains('hovered')){
                            alreadyHovered = true;
                            break;
                        }
                    }

                    if (alreadyHovered){
                        for (let i = 0; i < cards.length; i++){
                            cards[i].classList.remove ('hovered'); 
                        }
                        if (selectIndex > 0){
                            cards[cardOrder[selectIndex-1]].classList.add('hovered');
                            selectIndex = selectIndex-1;
                        }
                        else{
                            cards[cardOrder[cardOrder.length - 1]].classList.add('hovered');
                            selectIndex = cardOrder.length - 1;
                        }
                    }
                    else{
                        cards[cardOrder[selectIndex]].classList.add('hovered');
                    }
                }
            }
            if (event.key == 'd'){
                if (cards.length >= 1){
                    alreadyHovered = false;

                    for (let i = 0; i < cards.length; i++){
                        if (cards[i].classList.contains('hovered')){
                            alreadyHovered = true;
                            break;
                        }
                    }

                    if (alreadyHovered){
                        for (let i = 0; i < cards.length; i++){
                            cards[i].classList.remove ('hovered'); 
                        }
                        if (selectIndex < cards.length - 1){
                            cards[cardOrder[selectIndex+1]].classList.add('hovered');
                            selectIndex = selectIndex+1;
                        }
                        else{
                            cards[cardOrder[0]].classList.add('hovered');
                            selectIndex = 0;
                        }
                    }
                    else{
                        cards[cardOrder[selectIndex]].classList.add('hovered');
                    }
                }
            }
            if (event.key == 'q'){
                if (cards.length >= 1){
                    alreadyHovered = false;

                    for (let i = 0; i < cards.length; i++){
                        if (cards[i].classList.contains('hovered')){
                            alreadyHovered = true;
                            break;
                        }
                    }

                    if (alreadyHovered){
                        if (selectIndex > 0){
                            [originalLeft[cardOrder[selectIndex]], originalLeft[cardOrder[selectIndex-1]]] = [originalLeft[cardOrder[selectIndex-1]], originalLeft[cardOrder[selectIndex]]];
                            [cardOrder[selectIndex], cardOrder[selectIndex-1]] = [cardOrder[selectIndex-1], cardOrder[selectIndex]];
                            cards[cardOrder[selectIndex]].style.left = `${originalLeft[cardOrder[selectIndex]]}px`;
                            cards[cardOrder[selectIndex-1]].style.left = `${originalLeft[cardOrder[selectIndex-1]]}px`;
                            selectIndex = selectIndex-1;
                        }
                        else{
                            for (let i = 0; i < cardOrder.length - 1; i++){
                                [originalLeft[cardOrder[i]], originalLeft[cardOrder[i+1]]] = [originalLeft[cardOrder[i+1]], originalLeft[cardOrder[i]]];
                                cards[cardOrder[i]].style.left = `${originalLeft[cardOrder[i]]}px`;
                                cards[cardOrder[i+1]].style.left = `${originalLeft[cardOrder[i+1]]}px`;
                                [cardOrder[i], cardOrder[i+1]] = [cardOrder[i+1], cardOrder[i]];
                            }
                            selectIndex = cardOrder.length - 1;
                        }
                        console.log(cardOrder, selectIndex);
                    }
                    else{
                        cards[cardOrder[selectIndex]].classList.add('hovered');
                    }
                }
            }
            if (event.key == 'e'){
                if (cards.length >= 1){
                    alreadyHovered = false;

                    for (let i = 0; i < cards.length; i++){
                        if (cards[i].classList.contains('hovered')){
                            alreadyHovered = true;
                            break;
                        }
                    }

                    if (alreadyHovered){
                        if (selectIndex < cards.length - 1){
                            [originalLeft[cardOrder[selectIndex]], originalLeft[cardOrder[selectIndex+1]]] = [originalLeft[cardOrder[selectIndex+1]], originalLeft[cardOrder[selectIndex]]];
                            [cardOrder[selectIndex], cardOrder[selectIndex+1]] = [cardOrder[selectIndex+1], cardOrder[selectIndex]];
                            cards[cardOrder[selectIndex]].style.left = `${originalLeft[cardOrder[selectIndex]]}px`;
                            cards[cardOrder[selectIndex+1]].style.left = `${originalLeft[cardOrder[selectIndex+1]]}px`;
                            selectIndex = selectIndex+1;
                        }
                        else{
                            for (let i = cardOrder.length - 1; i > 0; i--){
                                [originalLeft[cardOrder[i]], originalLeft[cardOrder[i-1]]] = [originalLeft[cardOrder[i-1]], originalLeft[cardOrder[i]]];
                                cards[cardOrder[i]].style.left = `${originalLeft[cardOrder[i]]}px`;
                                cards[cardOrder[i-1]].style.left = `${originalLeft[cardOrder[i-1]]}px`;
                                [cardOrder[i], cardOrder[i-1]] = [cardOrder[i-1], cardOrder[i]];
                            }
                            selectIndex = 0;
                        }
                        console.log(cardOrder, selectIndex);
                    }
                    else{
                        cards[cardOrder[selectIndex]].classList.add('hovered');
                    }
                }
            }
            if (event.key == 'ArrowLeft' || event.key == 'ArrowRight'){
                if (cards.length >= 1){
                    let hovered = -1;
                    for (let i = 0; i < cards.length; i++){
                        if (cards[cardOrder[i]].classList.contains('hovered')){
                            hovered = i;
                            console.log(hovered);
                            break;
                        }
                    }

                    if (hovered !== -1){
                        placeCorrectly = false;
                        const removed = cardOrder[hovered];

                        if (event.key == 'ArrowLeft' && Math.abs(parseInt(cards[removed].value.slice(0, -1)) - parseInt(plays[0].value.slice(0, -1))) == 1){
                            placeCorrectly = true;
                            opponentPlayed.push(cards[removed].value);
                        }
                        else if (event.key == 'ArrowRight' && Math.abs(parseInt(cards[removed].value.slice(0, -1)) - parseInt(plays[1].value.slice(0, -1))) == 1){
                            placeCorrectly = true;
                            userPlayed.push(cards[removed].value);
                        }
                        
                        if (placeCorrectly){
                            place(cards[removed].style.backgroundPosition, parseInt(cards[removed].style.left), cards[removed].style.top, event.key, cards[removed].value);
                            

                            // remove the card from DOM and order arrays
                            cards[removed].remove();
                            cardOrder.splice(hovered, 1);
                            originalLeft.splice(removed, 1);

                            // Shift DOM indices in cardOrder due to removed card
                            for (let i = 0; i < cardOrder.length; i++){
                                if (cardOrder[i] > removed){
                                    cardOrder[i] -= 1;
                                }
                            }

                            // Recalculate positions so cards slide into place
                            const cardWidth = 25 * Math.min(window.innerWidth, window.innerHeight) / 100 / 2.5;
                            for (let i = 0; i < cards.length; i++){
                                const cardIndex = cardOrder[i];
                                const newLeft = 0.5 * window.innerWidth - cardWidth / 2 + (i - (cards.length - 1) / 2) * (cardWidth + gap);
                                originalLeft[cardIndex] = newLeft;
                                cards[cardIndex].style.left = `${newLeft}px`;
                                cards[cardIndex].style.top = originalTop;
                            }

                            selectIndex = Math.min(hovered, cardOrder.length - 1);
                            if (selectIndex >= 0){
                                cards[cardOrder[selectIndex]].classList.add('hovered');
                            }
                        }
                    }
                }
            }
            if (event.key == 'Shift'){
                if (opponentRetryDeck.length == 0 && userRetryDeck.length == 0){
                    plays[0].style.background = "none";
                    plays[1].style.background = "none";
                    opponentPlayedCount = opponentPlayed.length;
                    userPlayedCount = userPlayed.length;
                    for (let i = opponentPlayed.length; i > 0; i--){
                        random = Math.floor(Math.random() * i)
                        opponentRetryDeck.push(opponentPlayed[random]);
                        opponentPlayed.splice(random, 1);
                    }
                    for (let i = userPlayed.length; i > 0; i--){
                        random = Math.floor(Math.random() * i)
                        userRetryDeck.push(userPlayed[random]);
                        userPlayed.splice(random, 1);
                    }
                }

                if (opponentRetryDeck.length > 0){
                    place(`calc((-25vmin / 2.5) * ${CARDNAMES.indexOf(opponentRetryDeck[opponentRetryDeck.length - 1])}) 0`, retryCards[0].offsetLeft, retryCards[0].offsetTop, 'ArrowLeft', opponentRetryDeck[opponentRetryDeck.length - 1]);
                    opponentPlayed.push(opponentRetryDeck[opponentRetryDeck.length - 1]);
                    opponentRetryDeck.splice(opponentRetryDeck.length - 1, 1);
                }
                if (userRetryDeck.length > 0){
                    place(`calc((-25vmin / 2.5) * ${CARDNAMES.indexOf(userRetryDeck[userRetryDeck.length - 1])}) 0`, retryCards[1].offsetLeft, retryCards[1].offsetTop, 'ArrowRight', userRetryDeck[userRetryDeck.length - 1]);
                    userPlayed.push(userRetryDeck[userRetryDeck.length - 1]);
                    userRetryDeck.splice(userRetryDeck.length - 1, 1);
                }
                if (opponentRetryDeck.length == 0){
                    retryCards[0].style.background = "none";
                }
                else{
                    retryCards[0].style.background = "";
                    retryCards[0].style.backgroundPosition = `calc((-25vmin / 2.5) * 52) 0`;
                }
                if (userRetryDeck.length == 0){
                    retryCards[1].style.background = "none";
                }
                else{
                    retryCards[1].style.background = "";
                    retryCards[1].style.backgroundPosition = `calc((-25vmin / 2.5) * 52) 0`;
                }
            }
        }

        function draw(){
            if (cards.length == 0){
                selectIndex = 0;
            }

            if (userDeck.length == 0 || cards.length == MAXCARDS){
                return;
            }

            const card = document.createElement('div');
            card.className = "card";
            for (let i = 0; i < cards.length; i++){
                originalLeft[i] = originalLeft[i] - ((25 * Math.min(window.innerWidth, window.innerHeight) / 100 / 2.5) / 2 + gap/2);
                cards[i].style.left = `${originalLeft[i]}px`;
            }
            originalLeft.push(0.5*window.innerWidth - ((25 * Math.min(window.innerWidth, window.innerHeight) / 100 / 2.5) / 2) + ((25 * Math.min(window.innerWidth, window.innerHeight) / 100 / 2.5) / 2 + gap/2) * cards.length);
            card.style.left = `${originalLeft[originalLeft.length - 1]}px`;
            card.style.top = originalTop;

            card.value = userDeck[userDeck.length - 1];
            card.style.backgroundPosition = `calc((-25vmin / 2.5) * ${CARDNAMES.indexOf(userDeck[userDeck.length - 1])}) 0`;
            userDeck.splice(userDeck.length - 1, 1);

            card.style.animation = 'draw 0.5s';
            card.addEventListener('mousemove', hover);
            card.addEventListener('mouseleave', unhover);
            card.addEventListener('mousedown', grab);
            document.body.appendChild(card);
            cardOrder.push(cards.length-1);
            console.log(cardOrder);
        }
        function hover(event){
            if (!event.target.classList.contains('grabbed')){
                for (let i = 0; i < cards.length; i++){
                    cards[i].classList.remove ('hovered'); 
                    if (cards[i] == event.target){
                        selectIndex = cardOrder.indexOf(i);
                    }
                }
                event.target.classList.add('hovered');
                console.log(selectIndex);
            }
        }
        function unhover(event){
            event.target.classList.remove('hovered');
        }
        function grab(event){
            event.target.classList.add('grabbed');
            for (let i = 0; i < cards.length; i++){
                if (cards[i] == event.target){
                    selectedCard = i;
                }
                cards[i].classList.remove('hovered'); 
            }
            console.log(selectedCard);
            cards[selectedCard].style.left = event.clientX - cards[selectedCard].offsetWidth/2 + 'px';
            cards[selectedCard].style.top = event.clientY - cards[selectedCard].offsetHeight/2 + 'px';

            
        }
        function move(event){
            if (selectedCard != null){
                for (let i = 0; i < 2; i++){
                    if (event.clientX > plays[i].offsetLeft && event.clientX < plays[i].offsetLeft + plays[i].offsetWidth && event.clientY > plays[i].offsetTop && event.clientY < plays[i].offsetTop + plays[i].offsetHeight){
                        cards[selectedCard].style.transition = 'left 0.1s, top 0.1s';
                        cards[selectedCard].style.left = `${plays[i].offsetLeft}px`;
                        cards[selectedCard].style.top = plays[i].style.top;
                        hoveringPlay = true;
                        break;
                    }
                    else{
                        hoveringPlay = false;
                    }
                }
                if (!hoveringPlay){
                    cards[selectedCard].style.transition = "";
                    cards[selectedCard].style.left = event.clientX - cards[selectedCard].offsetWidth/2 + 'px';
                    cards[selectedCard].style.top = event.clientY - cards[selectedCard].offsetHeight/2 + 'px';
                }

                if (cards.length > 1){
                    for (let i = 0; i < cards.length; i++){
                        if (i != selectedCard){
                            topLimit = getComputedStyle(cards[i]).top;
                        }
                    }

                    if (event.clientY < parseInt(topLimit)){
                        for (let i = 0; i < cards.length; i++){
                            if (cardOrder.indexOf(i) < cardOrder.indexOf(selectedCard)){
                                cards[i].style.left = `${originalLeft[i] + (25 * Math.min(window.innerWidth, window.innerHeight) / 100 / 2.5) / 2 + gap/2}px`;
                            }
                            if (cardOrder.indexOf(i) > cardOrder.indexOf(selectedCard)){
                                cards[i].style.left = `${originalLeft[i] - (25 * Math.min(window.innerWidth, window.innerHeight) / 100 / 2.5) / 2 - gap/2}px`;
                            }
                        }
                    }
                    
                    for (let i = 0; i < cards.length; i++){
                        if (i == selectedCard){
                            continue;
                        }

                        if (event.clientY > parseInt(topLimit)){
                            cards[i].style.left = `${originalLeft[i]}px`;
                        }

                        if (event.clientX > originalLeft[i] + cards[i].offsetWidth/2 && cardOrder.indexOf(i) > cardOrder.indexOf(selectedCard)){
                            originalLeft[selectedCard] = originalLeft[i];
                            console.log(originalLeft[selectedCard]);

                            if (event.clientY > parseInt(topLimit)){
                                cards[i].style.left = `${originalLeft[i] - ((25 * Math.min(window.innerWidth, window.innerHeight) / 100 / 2.5) + gap) * (cardOrder.indexOf(i) - cardOrder.indexOf(selectedCard))}px`;
                            }

                            originalLeft[i] = originalLeft[i] - ((25 * Math.min(window.innerWidth, window.innerHeight) / 100 / 2.5) + gap) * (cardOrder.indexOf(i) - cardOrder.indexOf(selectedCard));
                            console.log(originalLeft[i]);
                            [cardOrder[cardOrder.indexOf(i)], cardOrder[cardOrder.indexOf(selectedCard)]] = [cardOrder[cardOrder.indexOf(selectedCard)], cardOrder[cardOrder.indexOf(i)]];
                            console.log(cardOrder);
                        }
                        else if (event.clientX < originalLeft[i] + cards[i].offsetWidth/2 && cardOrder.indexOf(i) < cardOrder.indexOf(selectedCard)){
                            originalLeft[selectedCard] = originalLeft[i];
                            console.log(originalLeft[selectedCard]);

                            if (event.clientY > parseInt(topLimit)){
                                cards[i].style.left = `${originalLeft[i] - ((25 * Math.min(window.innerWidth, window.innerHeight) / 100 / 2.5) + gap) * (cardOrder.indexOf(i) - cardOrder.indexOf(selectedCard))}px`;
                            }

                            originalLeft[i] = originalLeft[i] - ((25 * Math.min(window.innerWidth, window.innerHeight) / 100 / 2.5) + gap) * (cardOrder.indexOf(i) - cardOrder.indexOf(selectedCard));
                            console.log(originalLeft[i]);
                            [cardOrder[cardOrder.indexOf(selectedCard)], cardOrder[cardOrder.indexOf(i)]] = [cardOrder[cardOrder.indexOf(i)], cardOrder[cardOrder.indexOf(selectedCard)]];
                            console.log(cardOrder);
                        }
                    }
                }

                
            }
        }
        function drop(event){
            if (selectedCard != null){
                if (hoveringPlay){
                    placeCorrectly = false;
                    if (event.clientX > plays[0].offsetLeft && event.clientX < plays[0].offsetLeft + plays[0].offsetWidth && event.clientY > plays[0].offsetTop && event.clientY < plays[0].offsetTop + plays[0].offsetHeight && Math.abs(parseInt(cards[selectedCard].value.slice(0, -1)) - parseInt(plays[0].value.slice(0, -1))) == 1){
                        placeCorrectly = true;
                        place(cards[selectedCard].style.backgroundPosition, parseInt(cards[selectedCard].style.left), cards[selectedCard].style.top, 'ArrowLeft', cards[selectedCard].value);
                        opponentPlayed.push(cards[selectedCard].value);
                    }
                    else if (event.clientX > plays[1].offsetLeft && event.clientX < plays[1].offsetLeft + plays[1].offsetWidth && event.clientY > plays[1].offsetTop && event.clientY < plays[1].offsetTop + plays[1].offsetHeight && Math.abs(parseInt(cards[selectedCard].value.slice(0, -1)) - parseInt(plays[1].value.slice(0, -1))) == 1){
                        placeCorrectly = true;
                        place(cards[selectedCard].style.backgroundPosition, parseInt(cards[selectedCard].style.left), cards[selectedCard].style.top, 'ArrowRight', cards[selectedCard].value);
                        userPlayed.push(cards[selectedCard].value);
                    }

                    if (placeCorrectly){
                        const removed = cardOrder[cardOrder.indexOf(selectedCard)];
                        // remove the card from DOM and order arrays
                        cards[removed].remove();
                        cardOrder.splice(cardOrder.indexOf(selectedCard), 1);
                        originalLeft.splice(removed, 1);
                        // Shift DOM indices in cardOrder due to removed card
                        for (let i = 0; i < cardOrder.length; i++){
                            if (cardOrder[i] > removed){
                                cardOrder[i] -= 1;
                            }
                        }

                        // Assign Original left values
                        for (let i = 0; i < cards.length; i++){
                            newOriginalLeft = cards[i].style.left;
                            originalLeft[i] = parseInt(newOriginalLeft.slice(0, newOriginalLeft.length - 2));
                        }

                        selectIndex = Math.min(cardOrder.indexOf(selectedCard), cardOrder.length - 1);
                        hoveringPlay = false;
                        selectedCard = null;
                        return;
                    }
                }
                cards[selectedCard].classList.remove('grabbed');
                cards[selectedCard].style.zIndex = 999;
                cards[selectedCard].style.transition = '';
                cards[selectedCard].addEventListener('transitionend', function(){
                    event.target.style.zIndex = '';
                }, {once: true});

                for (let i = 0; i < cards.length; i++){
                    cards[i].style.left = `${originalLeft[i]}px`;
                    cards[i].style.top = originalTop;

                }
                
                hoveringPlay = false;
                selectedCard = null;
            }
        }
        function resize(){
            gap = 5 * Math.min(window.innerWidth, window.innerHeight) / 100;
            const cardWidth = 25 * Math.min(window.innerWidth, window.innerHeight) / 100 / 2.5;

            for (let i = 0; i < cards.length; i++){
                const cardIndex = cardOrder[i]; // actual DOM index
                const card = cards[cardIndex];

                card.style.transition = 'none';

                originalLeft[cardIndex] =
                    0.5 * window.innerWidth
                    - cardWidth / 2
                    + (i - (cards.length - 1) / 2) * (cardWidth + gap);

                card.style.left = `${originalLeft[cardIndex]}px`;
                card.style.top = originalTop;
            }

            // Force reflow
            document.body.offsetHeight;

            // Restore transitions
            for (let i = 0; i < cards.length; i++){
                cards[i].style.transition = "";
            }
        }
        function place(backgroundPosition, left, top, key, value){
            const play = document.createElement('div');
            play.className = "play";
            play.style.left = `${left}px`;
            play.style.top = top;
            play.style.backgroundPosition = backgroundPosition;
            document.body.appendChild(play);
            if (key == 'ArrowLeft'){
                plays[0].value = value;
                play.offsetHeight;
                play.style.left = plays[0].style.left;
                play.style.top = plays[0].style.top;
                play.addEventListener('transitionend', function(){
                    plays[0].style.background = "";
                    plays[0].style.backgroundPosition = backgroundPosition;
                    play.remove();
                }, {once: true});
            }
            else if (key == 'ArrowRight'){
                plays[1].value = value;
                play.offsetHeight;
                play.style.left = plays[1].style.left;
                play.style.top = plays[1].style.top;
                play.addEventListener('transitionend', function(){
                    plays[1].style.background = "";
                    plays[1].style.backgroundPosition = backgroundPosition;
                    play.remove();
                }, {once: true});
            }
        }
    </script>
</body>
